<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>2026 福岡北九州自由行｜行程 App</title>
    <meta name="description" content="2026 福岡北九州自由行手機版互動行程 App，含每日時間軸、花費、天氣與提醒。">
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div class="header-main">
          <div>
            <div class="meta-line">
              <span class="region-pill" id="region-pill">福岡</span>
              <span>✈️ 2026 福岡北九州 7 天 6 夜</span>
            </div>
            <h1 id="day-title">Day 1・6/18・福岡 Day 1</h1>
            <p id="stay-line">🏨 HEARTS Capsule Hotel & Spa 博多</p>
          </div>
          <aside class="weather-card" aria-label="天氣摘要">
            <span id="weather-icon">🌤️</span>
            <strong id="weather-temp">--°C</strong>
            <small id="weather-detail">--</small>
          </aside>
        </div>

        <div class="currency-tabs" aria-label="幣別切換">
          <button class="active" type="button" data-currency="JPY">JPY</button>
          <button type="button" data-currency="TWD">TWD</button>
          <button type="button" data-currency="USD">USD</button>
          <span>幣別</span>
        </div>

        <nav class="day-strip" id="day-strip" aria-label="每日行程"></nav>
        <div class="legend" id="region-legend"></div>
        <div class="access-bar">
          <span id="access-status">公開瀏覽模式</span>
          <button id="auth-button" type="button">管理者登入</button>
        </div>
      </header>

      <main>
        <section class="tab-panel active" id="panel-itinerary" aria-label="行程">
          <article class="stay-banner">
            <div>
              <span>🏨 今晚住宿</span>
              <strong id="stay-name">--</strong>
            </div>
            <a id="stay-map" href="#" target="_blank" rel="noreferrer">▣ 地圖</a>
          </article>
          <div class="itinerary-actions editor-only">
            <button id="add-itinerary" type="button">＋ 新增行程</button>
            <button id="reset-day" type="button" title="重設本日行程順序與時間" aria-label="重設本日行程順序與時間">↺</button>
          </div>
          <div class="timeline" id="timeline"></div>
        </section>

        <section class="tab-panel" id="panel-expenses" aria-label="花費">
          <header class="panel-title">
            <p>Budget</p>
            <h2>花費總覽</h2>
          </header>
          <div class="expense-summary" id="expense-summary"></div>
          <div class="expense-actions editor-only">
            <button id="add-expense" type="button">＋ 新增花費</button>
            <button id="reset-expenses" type="button" title="重設花費資料" aria-label="重設花費資料">↺</button>
          </div>
          <div class="expense-list" id="expense-list"></div>
        </section>

        <section class="tab-panel" id="panel-weather" aria-label="天氣">
          <header class="panel-title">
            <p>Weather</p>
            <h2>每日天氣備忘</h2>
          </header>
          <div class="weather-list" id="weather-list"></div>
        </section>

        <section class="tab-panel" id="panel-shopping" aria-label="採購">
          <header class="panel-title">
            <p>Shopping</p>
            <h2>採購清單</h2>
          </header>
          <div class="shopping-summary" id="shopping-summary"></div>
          <div class="shopping-filters" id="shopping-filters" aria-label="採購清單篩選"></div>
          <div class="shopping-actions editor-only">
            <button id="add-shopping" type="button">＋ 新增品項</button>
            <button id="reset-shopping" type="button" title="重設採購清單" aria-label="重設採購清單">↺</button>
          </div>
          <div class="shopping-list" id="shopping-list"></div>
        </section>

        <section class="tab-panel" id="panel-reminders" aria-label="提醒">
          <header class="panel-title">
            <p>Reminders</p>
            <h2>預訂資訊與提醒</h2>
          </header>
          <div class="booking-list" id="booking-list"></div>
          <div class="task-summary" id="task-summary"></div>
          <div class="task-actions editor-only">
            <button id="add-task" type="button">＋ 新增提醒</button>
            <button id="reset-tasks" type="button" title="重設提醒資料" aria-label="重設提醒資料">↺</button>
          </div>
          <div class="task-list" id="task-list"></div>
          <section class="data-backup editor-only">
            <header>
              <strong>資料備份</strong>
              <small>行程、花費、採購與提醒</small>
            </header>
            <div>
              <button id="export-data" type="button">匯出資料</button>
              <label for="import-data">匯入資料</label>
              <input id="import-data" type="file" accept="application/json,.json">
            </div>
            <small id="data-backup-status" role="status" aria-live="polite"></small>
          </section>
        </section>
      </main>

      <nav class="bottom-nav" aria-label="主要功能">
        <button class="active" type="button" data-tab="itinerary">
          <span>◎</span>
          行程
        </button>
        <button type="button" data-tab="expenses">
          <span>◎</span>
          花費
        </button>
        <button type="button" data-tab="weather">
          <span>◎</span>
          天氣
        </button>
        <button type="button" data-tab="shopping">
          <span>◎</span>
          採購
        </button>
        <button type="button" data-tab="reminders">
          <span>◎</span>
          提醒
        </button>
      </nav>
    </div>

    <dialog class="auth-dialog" id="auth-dialog">
      <form method="dialog" class="auth-dialog-card">
        <header>
          <div>
            <small>Administrator</small>
            <h2>管理者登入</h2>
          </div>
          <button class="auth-close" type="submit" aria-label="關閉">×</button>
        </header>
        <div id="auth-credentials">
          <label>
            <span>Email</span>
            <input id="auth-email" type="email" autocomplete="email" required>
          </label>
          <label>
            <span>密碼</span>
            <input id="auth-password" type="password" autocomplete="current-password" minlength="6" required>
          </label>
          <div class="auth-actions">
            <button id="auth-signin" type="button">登入</button>
            <button id="auth-signup" type="button">建立帳號</button>
          </div>
        </div>
        <div id="auth-claim" hidden>
          <label>
            <span>首次管理者設定碼</span>
            <input id="auth-claim-code" type="password" autocomplete="off">
          </label>
          <button id="auth-claim-button" type="button">認領管理權限</button>
        </div>
        <div id="auth-session" hidden>
          <strong id="auth-user-email"></strong>
          <button id="auth-signout" type="button">登出</button>
        </div>
        <p id="auth-message" role="status" aria-live="polite"></p>
      </form>
    </dialog>

    <script src="trip-data.js"></script>
    <script src="assets/vendor/Sortable.min.js"></script>
    <script src="assets/vendor/supabase.min.js"></script>
    <script src="supabase-config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
